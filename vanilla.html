	<script type="text/javascript">
		"use strict";
		window.addEventListener("load", async () => {
			if (document.location.href.startsWith("file:")) {
				alert("HTTP please, do not open this file locally, run a local HTTP server and load it via HTTP");
			} else {
				try {
					checkServiceWorker()
					const [js, epk] = ([
						await loadCachedAssetUI("javascript/meta.json", false, "1.8.8-js"),
						await loadCachedAssetUI("game-assets/meta.json", true, "1.8.8-js")
					])
					const relayId = Math.floor(Math.random() * 4);
					const params = {
						demoMode: false,
						container: "game_frame",
						assetsURI: epk,
						localesURI: "lang/",
						worldsDB: "worlds",
						...(await (await fetch("/list.json")).json())
					};
					await new Promise(res => {
						(async () => {
							await window.wispcraftServerReady
							res()
						})()
						setTimeout(1500, () => res())
					})
					params.relays[Math.round(Math.random() * (params.relays.length - 1))].primary = true;
					parseParams(params);
					launch(utf8ToString(js), params)
				} catch (err) {
					window.alert("Something went wrong, try clearing your browser cache/data?\n---\n" + err.stack ?? err)

				}
			}
		});
	</script>
